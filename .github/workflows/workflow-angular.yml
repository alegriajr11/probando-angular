name: CI Angular App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Inicio de trabajo
        run: |
          echo "Iniciando el trabajo de CI para la aplicación Angular"
          echo "Evento: ${{ github.event_name }} | Rama: ${{ github.ref }} | Actor: ${{ github.actor }}"

      # IMPORTANTE: traer el código al runner antes de cualquier comando
      - name: Checkout repository
        uses: actions/checkout@v4

      # Instalar Node.js en el runner
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Instalar dependencias (usar npm ci requiere package-lock.json)
      - name: Instalar dependencias
        run: npm ci

      # Ejecutar tests (ajusta si tu proyecto no tiene tests o usa otro comando)
      - name: Ejecutar pruebas
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Finalizar trabajo
        run: echo "Trabajo de CI para la aplicación Angular completado exitosamente"

      # Ejemplo de uso seguro de secrets (no mostrar valor real)
      - name: Verificar SAMPLE_SECRET (no mostrar valor)
        env:
          SAMPLE_SECRET: ${{ secrets.SAMPLE_SECRET }}
        run: |
          # Si la variable está vacía, fallamos para demostrar uso seguro de secrets
          if [ -z "$SAMPLE_SECRET" ]; then
            echo "ERROR: SAMPLE_SECRET no está configurado"
            exit 1
          else
            # Mostramos sólo que existe y su longitud, NUNCA su valor
            echo "SAMPLE_SECRET presente (longitud=${#SAMPLE_SECRET})"
          fi