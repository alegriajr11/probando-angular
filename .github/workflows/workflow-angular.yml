name: CI Angular App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Inicio de trabajo
        run: |
          echo "Iniciando el trabajo de CI para la aplicación Angular"
          echo "Evento: ${{ github.event_name }} | Rama: ${{ github.ref }} | Actor: ${{ github.actor }}"

      # IMPORTANTE: traer el código al runner antes de cualquier comando
      - name: Checkout repository
        uses: actions/checkout@v4

      # Instalar Node.js en el runner
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Instalar dependencias (usar npm ci requiere package-lock.json)
      - name: Instalar dependencias
        run: npm ci

      # Ejecutar tests (ajusta si tu proyecto no tiene tests o usa otro comando)
      - name: Ejecutar pruebas
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Finalizar trabajo
        run: echo "Trabajo de CI para la aplicación Angular completado exitosamente"